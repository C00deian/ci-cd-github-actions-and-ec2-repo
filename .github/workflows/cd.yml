name: CD

on:
  push:
    branches:
      - master

jobs:
  docker-build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Jar
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/ci-cd-github-actions-and-ec2:${{ github.sha }} \
          -t ${{ secrets.DOCKER_USERNAME }}/ci-cd-github-actions-and-ec2:latest \
          .

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-github-actions-and-ec2:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-github-actions-and-ec2:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop ci-cd-github-actions-and-ec2 || true
            docker rm ci-cd-github-actions-and-ec2 || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/ci-cd-github-actions-and-ec2:${{ github.sha }}

            docker run -d \
              --name ci-cd-github-actions-and-ec2 \
              -p 8080:8080 \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/ci-cd-github-actions-and-ec2:${{ github.sha }}
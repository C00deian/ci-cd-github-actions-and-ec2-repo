name: Docker Build -> Push -> Deploy to EC2

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Jar with Maven
        run: mvn clean install

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME}}/ci-cd-github-actions:latest


      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-github-actions:latest


      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop ci-cd-github-actions || true
            docker rm   ci-cd-github-actions || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/ci-cd-github-actions:latest
            docker run -d --name  ci-cd-github-actions -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/ci-cd-github-actions:latest
